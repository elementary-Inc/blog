<div class="byline">
  <img
    srcset="https://www.gravatar.com/avatar/{{ include.gravatar }}?s=96&d=blank 2x"
    src="https://www.gravatar.com/avatar/{{ include.gravatar }}?s=48&d=blank"
    alt="Avatar for {{ include.name }}"
  />
  <div class="author">
    <span class="name">{{ include.name }}</span>
    <span class="description">{{ include.description }}</span>
  </div>
</div>
