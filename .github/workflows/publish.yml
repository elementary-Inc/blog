---

name: Publish

on:
  push:
    branches:
      - main
      - cron
  schedule:
    - cron: "0 0 * * *"

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Cache
        uses: actions/cache@v2
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}

      - uses: helaili/jekyll-action@2.0.4
        env:
          JEKYLL_PAT: ${{ secrets.GIT_USER_TOKEN }}
        with:
          target_branch: 'gh-pages'
