---

name: Publish

on:
  push:
    branches:
      - main
      - cron
  schedule:
    - cron: "0 0 * * *"

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Cache
        uses: actions/cache@v2
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}

      - name: Build
        run: |
          docker run \
          -v ${{ github.workspace }}:/srv/jekyll -v ${{ github.workspace }}/_site:/srv/jekyll/_site \
          jekyll/builder:3 /bin/bash -c "chmod 777 /srv/jekyll && jekyll build"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v2
        env:
          PERSONAL_TOKEN: ${{ secrets.GIT_USER_TOKEN }}
          PUBLISH_BRANCH: gh-pages
          PUBLISH_DIR: ./_site
